events {}

http {
    upstream  frontend {server frontend:3000;}
    upstream  backend {server backend:8000;}

    server {
        listen 80;

        location / {
            proxy_pass  http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real_IP $remote_addr;    
        }

        location /api/ {
            proxy_pass  http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real_IP $remote_addr;    
        }
    }
}