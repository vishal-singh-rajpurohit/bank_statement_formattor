# version: "3.9"

networks:
  statement_network:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - statement_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: statement_server

    ports:
      - "8000:8000"

    environment:
      CORS_ORIGIN: ${CORS_ORIGIN}
      PGQL_URL: ${PGQL_URL}

      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY}

      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}

      ALGO: ${ALGO}

      RESENDER_API_KEY: ${RESENDER_API_KEY}

      SESSION_SECRET: ${SESSION_SECRET}

      ADMIN_MAIL_ADDRESS: ${ADMIN_MAIL_ADDRESS}

      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
    
    depends_on:
      - db

    networks:
      - statement_network
    
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_API_URI: ${NEXT_PUBLIC_API_URI}      # match .env key exactly
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}

    container_name: statement_client


    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URI}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}

    depends_on:
      - backend

    networks:
      - statement_network

    restart: unless-stopped

volumes:
    postgres_data: